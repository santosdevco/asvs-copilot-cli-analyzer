
description: "String: Resumen de 1 a 3 líneas explicando el propósito principal del componente y su responsabilidad en el sistema."
architecture_role: "String: Rol técnico dentro de la arquitectura general (ej. Frontend admin UI, Backend microservice, API Gateway)."
framework: "String: Tecnologías, lenguajes o librerías principales que sostienen el componente."
base_path: "String: Ruta base del directorio en el código fuente o prefijo principal de la API (ej. src/app/Users/ o /api/v1/auth)."

data_flows:
  inputs:
    - "Lista de Strings: Orígenes de datos que entran al componente (ej. Formularios UI, Parámetros URL, Webhooks externos, Headers)."
  outputs:
    - "Lista de Strings: Datos o acciones que el componente envía hacia afuera (ej. Llamadas a APIs externas, Respuestas JSON, Eventos emitidos)."
  api_interactions:
    - "Lista de Strings: [REGLA DE FORMATO ESTRICTO] Deben tener el formato 'MÉTODO /ruta: Descripción corta' (ej. 'GET /api/users: Obtiene lista de usuarios')."
  external_dependencies:
    - "Lista de Strings: Dependencias críticas externas, bases de datos, librerías de terceros o servicios cloud."

business_logic:
  - "Lista de Strings: Reglas de negocio clave, validaciones específicas, límites, restricciones o algoritmos importantes del componente."

trust_boundaries:
  - "Lista de Strings: Puntos de cruce donde los datos cambian de nivel de confianza (ej. Input del navegador del cliente → API del Backend)."

access_control:
  - "Lista de Strings: Reglas de autorización, roles requeridos, protecciones de rutas o permisos específicos para usar este componente."