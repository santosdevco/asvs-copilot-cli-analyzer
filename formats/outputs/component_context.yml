component_name: "Módulo de Gestión de Usuarios"
description: "Interfaz frontend para la administración de usuarios, asignación de roles y control de estado."
architecture_role: "Frontend admin UI — proporciona operaciones CRUD para la entidad Usuario"
framework: "React 17.0.2 + Carbon Design System + Axios"
base_path: "src/app/User/"

data_flows:
  inputs:
    - "Formularios de UI — datos de creación/edición de usuario (nombre, email, rol)"
    - "Query params — filtros de búsqueda en la tabla de usuarios"
  outputs:
    - "GET /api/users — recupera lista paginada de usuarios"
    - "POST /api/users — envía payload con datos del nuevo usuario"
  api_interactions:
    - "GET /api/users: Lista usuarios con filtros de rol y estado"
    - "GET /api/users/:id: Detalle de usuario y permisos"
    - "POST /api/users: Crea nuevo usuario administrador"
    - "PUT /api/users/:id: Actualiza perfil y roles"
    - "DELETE /api/users/:id: Desactivación lógica (soft delete)"
  external_dependencies:
    - "src/Api/index.js — cliente Axios centralizado"
    - "carbon-components-react — componentes UI (DataTable, Modal)"

business_logic:
  - "La vista de lista utiliza paginación del lado del servidor"
  - "El formulario valida formato de email en el cliente antes del envío"
  - "Los usuarios se marcan como inactivos (soft delete) en lugar de eliminación física"

trust_boundaries:
  - "Input del usuario admin → Cliente React (los datos se envían sin sanitizar al backend)"
  - "Respuesta del API → Renderizado en UI"

access_control:
  - "Rutas protegidas en cliente: requiere rol SuperAdmin para acceder a /users"
  - "Botones de Eliminar ocultos condicionalmente en la UI si el usuario no tiene permisos"
		